name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint, format & types
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (high+)
        run: npm audit --audit-level=high
        continue-on-error: true

      # Fast, browser-less guards: encoding, lint, formatting, types, build output.
      - name: Check source encoding
        run: npm run check:encoding

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate HTML
        run: npm run validate:html

      - name: Validate links
        run: npm run validate:links

  test:
    name: Build & cross-browser tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      # The config's webServer builds + previews the site automatically.
      # Functional + accessibility + keyboard tests run across Chromium,
      # Firefox, WebKit and two mobile profiles. Visual snapshots are
      # platform-specific and self-skip on CI (see tests/visual.spec.ts).
      - name: Run Playwright tests
        run: >-
          npx playwright test
          --project=desktop --project=mobile
          --project=firefox --project=webkit --project=mobile-safari
        env:
          CI: true

      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse budget (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Perf scores are noisy on shared runners, so this job reports but does not
    # block merges. Treat sustained drops as a signal to investigate.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Lighthouse budget
        run: npx playwright test --project=perf
        env:
          CI: true
